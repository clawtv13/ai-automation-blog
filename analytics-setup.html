<!-- Add to <head> of all pages -->
<script defer data-domain="aiautomationbuilder.com" src="https://plausible.io/js/script.js"></script>

<!-- 
Custom Events Tracking:
Track important conversions and user actions
-->

<script>
// Newsletter signup
document.addEventListener('submit', function(e) {
    if (e.target.matches('form[action*="beehiiv"]')) {
        plausible('Newsletter Signup', {props: {location: window.location.pathname}});
    }
});

// Lead magnet download
document.querySelectorAll('a[href*="starter-kit"]').forEach(link => {
    link.addEventListener('click', function() {
        plausible('Lead Magnet Click', {props: {magnet: 'starter-kit'}});
    });
});

// Social share clicks
document.querySelectorAll('.social-share a').forEach(link => {
    link.addEventListener('click', function() {
        const platform = this.textContent.includes('Tweet') ? 'Twitter' : 
                        this.textContent.includes('LinkedIn') ? 'LinkedIn' :
                        this.textContent.includes('Reddit') ? 'Reddit' : 'Email';
        plausible('Social Share', {props: {platform: platform}});
    });
});

// Outbound link clicks
document.addEventListener('click', function(e) {
    if (e.target.matches('a[href^="http"]') && !e.target.href.includes('aiautomationbuilder.com')) {
        plausible('Outbound Link', {props: {url: e.target.href}});
    }
});

// Read time tracking (scroll depth)
let maxScroll = 0;
let scrollTracked = false;

window.addEventListener('scroll', function() {
    const scrollPercent = Math.round((window.scrollY + window.innerHeight) / document.body.scrollHeight * 100);
    
    if (scrollPercent > maxScroll) {
        maxScroll = scrollPercent;
    }
    
    // Track once when 80% reached
    if (scrollPercent >= 80 && !scrollTracked) {
        scrollTracked = true;
        plausible('Deep Reader', {props: {scrolled: '80%+'}});
    }
});

// Exit intent (desktop only)
document.addEventListener('mouseleave', function(e) {
    if (e.clientY <= 0 && !localStorage.getItem('exit_shown_' + window.location.pathname)) {
        plausible('Exit Intent');
        localStorage.setItem('exit_shown_' + window.location.pathname, Date.now());
    }
});

// Time on page (send after 30 seconds)
setTimeout(function() {
    plausible('Engaged Reader', {props: {time: '30s+'}});
}, 30000);

// Track referral source
const urlParams = new URLSearchParams(window.location.search);
const ref = urlParams.get('ref');
if (ref) {
    plausible('Referral Visit', {props: {referrer: ref}});
}
</script>

<!-- 
Goals to track in Plausible dashboard:
- Newsletter Signup
- Lead Magnet Click
- Social Share
- Deep Reader (80% scroll)
- Engaged Reader (30s+ time)
- Referral Visit
- Outbound Link

Set up at: https://plausible.io/aiautomationbuilder.com/settings/goals
-->
